# HAL Feature Profile

audiomixer:
  interfaceVersion: current

  # List of mixer resources available on this platform.
  # Each resources entry describes a single logical audio mixer instance and its input capabilities
  resources:
    - id: 0  # Mixer instance 0 (secure)
      supportsSecure: true
      # Supported audio source types for dynamic input routing
      supportedSourceTypes:
        - AUDIO_SINK
        - HDMI_INPUT
        - COMPOSITE_INPUT
        - APPLICATION_AUDIO
      inputs:
        - name: main
          supportedContentTypes:
            - STREAM
          supportedCodecs:
            - DOLBY_AC3
            - DOLBY_AC3_PLUS
            - PCM_STEREO
            - PCM_MULTICHANNEL
            - AAC_LC
        - name: assoc
          supportedContentTypes:
            - STREAM
          supportedCodecs:
            - DOLBY_AC3
            - DOLBY_AC3_PLUS
            - PCM_STEREO
            - PCM_MULTICHANNEL
            - AAC_LC
        - name: pcm1
          supportedContentTypes:
            - STREAM
            - CLIP
            - TTS
          supportedCodecs:
            - PCM_STEREO
        - name: pcm2
          supportedContentTypes:
            - STREAM
            - CLIP
            - TTS
          supportedCodecs:
            - PCM_STEREO

    - id: 1  # Mixer instance 1 (non-secure)
      supportsSecure: false
      inputs:
        - name: main
          supportedContentTypes:
            - STREAM
          supportedCodecs:
            - PCM_STEREO
            - PCM_MULTICHANNEL
            - AAC_LC
        - name: aux
          supportedContentTypes:
            - CLIP
            - TTS
          supportedCodecs:
            - PCM_STEREO
            - PCM_MULTICHANNEL

  # List of output ports and their capabilities.
  # These define what each physical/logical output supports (e.g., HDMI, SPDIF).
  outputPorts:
    - id: 0
      portName: HDMI
      supportedProperties:
        - VOLUME
        - DELAY_MS
        - OUTPUT_FORMAT
      supportedOutputFormats:
        - AUTO
        - PCM_STEREO
        - AC3
        - EAC3
      supportedAQProcessors:
        - DOLBY_MS12_2_6
          # If this AQ processor is present on the output port,
          # getDolbyMs12_2_6_Dap() is supported for that port.
          supportsGetDolbyMs12_2_6_Dap: true
          setFunctions:
            setSurroundDecoderEnabled:
              supportsSurroundDecoderEnabled: true
              range:
                enabled: [true, false]
              default:
                enabled: false
            setBassEnhancer:
              supportsBassEnhancer: true
              range:
                boost:
                  min: 0
                  max: 100
              default:
                boost: 50
            setVolumeLeveller:
              supportsVolumeLeveller: true
              range:
                mode: [OFF, MANUAL, AUTO]
                level:
                  min: 0
                  max: 10
              default:
                mode: AUTO
                level: 5
            setSurroundVirtualizer:
              supportsSurroundVirtualizer: true
              range:
                mode: [OFF, MANUAL, AUTO]
                boost:
                  min: 0
                  max: 96
              default:
                mode: AUTO
                boost: 48
            setMediaIntelligentSteering:
              supportsMediaIntelligentSteering: true
              range:
                enabled: [true, false]
              default:
                enabled: true
            setPostGain:
              supportsPostGain: true
              range:
                gain:
                  min: -2080.0
                  max: 480.0
              default:
                gain: 0.0
            setDialogueEnhancer:
              supportsDialogueEnhancer: true
              range:
                level:
                  min: 0
                  max: 16
              default:
                level: 8
            setIntelligentEqualizerMode:
              supportsIntelligentEqualizerMode: true
              range:
                mode: [OFF, OPEN, RICH, FOCUSED, BALANCED, WARM, DETAILED]
              default:
                mode: BALANCED
            setGraphicEqualizerMode:
              supportsGraphicEqualizerMode: true
              range:
                mode: [OFF, OPEN, RICH, FOCUSED]
              default:
                mode: OPEN
            setDynamicRangeControlMode:
              supportsDynamicRangeControlMode: true
              range:
                mode: [LINE, RF]
              default:
                mode: LINE
            setAtmosLock:
              supportsAtmosLock: true
              range:
                enabled: [true, false]
              default:
                enabled: false
            setDownmixMode:
              supportsDownmixMode: true
              range:
                mode: [LT_RT, LO_RO]
              default:
                mode: LT_RT
            setVolumeModelerEnabled:
              supportsVolumeModelerEnabled: true
              range:
                enabled: [true, false]
              default:
                enabled: false
            setCenterSpreadingEnabled:
              supportsCenterSpreadingEnabled: true
              range:
                enabled: [true, false]
              default:
                enabled: false
            setActiveDownmixEnabled:
              supportsActiveDownmixEnabled: true
              range:
                enabled: [true, false]
              default:
                enabled: false
      supportsAudioCapture: false

    - id: 1
      portName: SPDIF
      supportedProperties:
        - VOLUME
        - OUTPUT_FORMAT
      supportedOutputFormats:
        - PCM_STEREO
        - AC3
      supportedAQProcessors:
        - UNDEFINED
      supportsAudioCapture: false

      - id: 2
      portName: PCM_CAPTURE
      supportedProperties: []
      supportedOutputFormats:
        - PCM_STEREO
        - PCM_MULTICHANNEL
      supportedAQProcessors:
        - UNDEFINED
      supportsAudioCapture: true
