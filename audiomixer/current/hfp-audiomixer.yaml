# HAL Feature Profile

audiomixer:
  interfaceVersion: current

  # List of mixer resources available on this platform.
  # Each resources entry describes a single logical audio mixer instance and its input capabilities
  resources:
    - id: 0  # Mixer instance 0 (secure)
      supportsSecure: true
      # Supported audio source types for dynamic input routing
      supportedSourceTypes:
        - AUDIO_SINK
        - HDMI_INPUT
        - COMPOSITE_INPUT
        - APPLICATION_AUDIO
      inputs:
        - name: main
          supportedContentTypes:
            - STREAM
          supportedCodecs:
            - DOLBY_AC3
            - DOLBY_AC3_PLUS
            - PCM_STEREO
            - PCM_MULTICHANNEL
            - AAC_LC
        - name: assoc
          supportedContentTypes:
            - STREAM
          supportedCodecs:
            - DOLBY_AC3
            - DOLBY_AC3_PLUS
            - PCM
            - AAC_LC
        - name: pcm1
          supportedContentTypes:
            - STREAM
            - CLIP
            - TTS
          supportedCodecs:
            - PCM_STEREO
        - name: pcm2
          supportedContentTypes:
            - STREAM
            - CLIP
            - TTS
          supportedCodecs:
            - PCM_STEREO

    - id: 1  # Mixer instance 1 (non-secure)
      supportsSecure: false
      inputs:
        - name: main
          supportedContentTypes:
            - STREAM
          supportedCodecs:
            - PCM
            - AAC_LC
        - name: aux
          supportedContentTypes:
            - CLIP
            - TTS
          supportedCodecs:
            - PCM_STEREO
            - PCM_MULTICHANNEL

  # List of output ports and their capabilities.
  # These define what each physical/logical output supports (e.g., HDMI, SPDIF).
  outputPorts:
    - id: 0
      portName: HDMI
      supportedProperties:
        - VOLUME
        - DELAY_MS
        - OUTPUT_FORMAT
      supportedOutputFormats:
        - AUTO
        - PCM_STEREO
        - AC3
        - EAC3
      supportedAQProcessors:
        - id: DOLBY_MS12_2_6 # Dolby MS12 IDK 2.6
          # If this AQ processor is present on the output port,
          # getDolbyMs12_2_6_Dap() is supported for that port.
          setFunctions:
            setSurroundDecoderEnabled:
              supportsSurroundDecoderEnabled: true
              range:
                enabled: [true, false]
              default:
                enabled: false
            setBassEnhancer:
              supportsBassEnhancer: true
              range:
                boost:
                  min: 0
                  max: 100
              default:
                boost: 50
            setVolumeLeveller:
              supportsVolumeLeveller: true
              range:
                mode: [OFF, MANUAL, AUTO]
                level:
                  min: 0
                  max: 10
              default:
                mode: AUTO
                level: 5
            setSurroundVirtualizer:
              supportsSurroundVirtualizer: true
              range:
                mode: [OFF, MANUAL, AUTO]
                boost:
                  min: 0
                  max: 96
              default:
                mode: AUTO
                boost: 48
            setMediaIntelligentSteering:
              supportsMediaIntelligentSteering: true
              range:
                enabled: [true, false]
              default:
                enabled: true
            setPostGain:
              supportsPostGain: true
              range:
                gain:
                  min: -2080.0
                  max: 480.0
              default:
                gain: 0.0
            setDialogueEnhancer:
              supportsDialogueEnhancer: true
              range:
                level:
                  min: 0
                  max: 12
              default:
                level: 8
            setIntelligentEqualizerMode:
              supportsIntelligentEqualizerMode: true
              range:
                mode: [OFF, OPEN, RICH, FOCUSED, BALANCED, WARM, DETAILED]
              default:
                mode: BALANCED
            setGraphicEqualizerMode:
              supportsGraphicEqualizerMode: true
              range:
                mode: [OFF, OPEN, RICH, FOCUSED]
              default:
                mode: OPEN
            setDynamicRangeControlMode:
              supportsDynamicRangeControlMode: true
              range:
                mode: [LINE, RF]
              default:
                mode: LINE
            setAtmosLock:
              supportsAtmosLock: true
              range:
                enabled: [true, false]
              default:
                enabled: false
            setDownmixMode:
              supportsDownmixMode: true
              range:
                mode: [LT_RT, LO_RO]
              default:
                mode: LT_RT
            setVolumeModelerEnabled:
              supportsVolumeModelerEnabled: true
              range:
                enabled: [true, false]
              default:
                enabled: false
            setCenterSpreadingEnabled:
              supportsCenterSpreadingEnabled: true
              range:
                enabled: [true, false]
              default:
                enabled: false
            setActiveDownmixEnabled:
              supportsActiveDownmixEnabled: true
              range:
                enabled: [true, false]
              default:
                enabled: false
      supportsAudioCapture: false

    - id: 1
      portName: SPDIF
      supportedProperties:
        - VOLUME
        - OUTPUT_FORMAT
      supportedOutputFormats:
        - PCM_STEREO
        - AC3
      supportedAQProcessors:
        - id: UNDEFINED
      supportsAudioCapture: false

    - id: 2
      portName: PCM_CAPTURE
      supportedProperties:
        - OUTPUT_FORMAT
      supportedOutputFormats:
        - PCM_STEREO
        - PCM_MULTICHANNEL
      supportedAQProcessors:
        - id: UNDEFINED
      supportsAudioCapture: true

      # Supported channel configurations for audio capture
      supportedChannelLayouts:
        # Stereo: Front Left, Front Right
        - format: PCM_STEREO
          channels: [CH_FL, CH_FR]

        # 5.1 Surround: Front Left, Front Right, Front Centre, LFE, Rear Left, Rear Right
        - format: PCM_MULTICHANNEL
          channels: [CH_FL, CH_FR, CH_FC, CH_LFE, CH_RL, CH_RR]
          description: "5.1 surround configuration"

        # 7.1 Surround: Front Left, Front Right, Front Centre, LFE, Side Left, Side Right, Rear Left, Rear Right
        - format: PCM_MULTICHANNEL
          channels: [CH_FL, CH_FR, CH_FC, CH_LFE, CH_SL, CH_SR, CH_RL, CH_RR]
          description: "7.1 surround configuration"

        # 5.1.2 Atmos: 5.1 + Top Front Left, Top Front Right
        - format: PCM_MULTICHANNEL
          channels: [CH_FL, CH_FR, CH_FC, CH_LFE, CH_RL, CH_RR, CH_TFL, CH_TFR]
          description: "5.1.2 Atmos configuration"

        # 5.1.4 Atmos: 5.1 + Top Front Left, Top Front Right, Top Rear Left, Top Rear Right
        - format: PCM_MULTICHANNEL
          channels: [CH_FL, CH_FR, CH_FC, CH_LFE, CH_RL, CH_RR, CH_TFL, CH_TFR, CH_TRL, CH_TRR]
          description: "5.1.4 Atmos configuration"

      # Supported channel definitions for AudioCapturePcmInfo.channelMap
      supportedChannels:
        - CH_FL   # Front Left
        - CH_FR   # Front Right
        - CH_FC   # Front Centre
        - CH_LFE  # Low-Frequency Effects (Subwoofer)
        - CH_SL   # Side Left
        - CH_SR   # Side Right
        - CH_RL   # Rear Left
        - CH_RR   # Rear Right
        - CH_RC   # Rear Centre
        - CH_TFL  # Top Front Left
        - CH_TFR  # Top Front Right
        - CH_TFC  # Top Front Centre
        - CH_TSL  # Top Side Left
        - CH_TSR  # Top Side Right
        - CH_TRL  # Top Rear Left
        - CH_TRR  # Top Rear Right
        - CH_WL   # Wide Left
        - CH_WR   # Wide Right
