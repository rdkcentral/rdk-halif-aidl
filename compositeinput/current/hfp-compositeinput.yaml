# HAL Feature Profile for composite input
#
# Property keys are unquoted PortProperty enum identifiers as defined in
# com.rdk.hal.compositeinput.PortProperty (PortProperty.aidl).
#
# Runtime status keys (slots 0..999):
#   SIGNAL_STRENGTH, SIGNAL_QUALITY
#
# Telemetry metric keys (slots 1000+; reset by resetMetrics()):
#   METRIC_SIGNAL_LOCK_TIME, METRIC_SIGNAL_DROPS, METRIC_UPTIME,
#   METRIC_SIGNAL_LOCK_COUNT, METRIC_LAST_SIGNAL_LOCK_TIME,
#   METRIC_LAST_RESET_TIMESTAMP

compositeinput:
  interfaceVersion: current

  # Per-port configuration
  ports:
    - id: 0
      name: "Front Panel Composite"
      description: "Front panel composite video input"

      # PortProperty enum identifiers supported on this port.
      # Includes both runtime status keys and telemetry metric keys.
      # Maps to PortCapabilities.supportedProperties.
      supportedProperties:
        - SIGNAL_STRENGTH                # Signal strength in dBm (longValue, read-only)
        - SIGNAL_QUALITY                 # Aggregated signal quality 0..100 (intValue, read-only)
        - METRIC_SIGNAL_LOCK_TIME        # Average signal lock time in ms (longValue, read-only)
        - METRIC_SIGNAL_DROPS            # Count of signal drops (longValue, read-only)
        - METRIC_UPTIME                  # Total uptime in ms (longValue, read-only)
        - METRIC_SIGNAL_LOCK_COUNT       # Count of successful lock acquisitions (longValue, read-only)
        - METRIC_LAST_SIGNAL_LOCK_TIME   # Most recent lock acquisition time in ms (longValue, read-only)
        - METRIC_LAST_RESET_TIMESTAMP    # Wall-clock timestamp of last resetMetrics() (longValue, read-only)

      # Property metadata for enhanced runtime discovery (matches PropertyMetadata.aidl).
      propertyMetadata:
        - key: SIGNAL_STRENGTH
          type: LONG
          readOnly: true
          isMetric: false
          description: "Signal strength in dBm"

        - key: SIGNAL_QUALITY
          type: INTEGER
          readOnly: true
          isMetric: false
          description: "Aggregated signal quality percentage (0..100)"

        - key: METRIC_SIGNAL_LOCK_TIME
          type: LONG
          readOnly: true
          isMetric: true
          description: "Average signal lock time in milliseconds"

        - key: METRIC_SIGNAL_DROPS
          type: LONG
          readOnly: true
          isMetric: true
          description: "Total count of signal drops since last reset"

        - key: METRIC_UPTIME
          type: LONG
          readOnly: true
          isMetric: true
          description: "Total uptime in milliseconds"

        - key: METRIC_SIGNAL_LOCK_COUNT
          type: LONG
          readOnly: true
          isMetric: true
          description: "Total count of successful signal lock acquisitions since last reset"

        - key: METRIC_LAST_SIGNAL_LOCK_TIME
          type: LONG
          readOnly: true
          isMetric: true
          description: "Most recent signal lock time in milliseconds"

        - key: METRIC_LAST_RESET_TIMESTAMP
          type: LONG
          readOnly: true
          isMetric: true
          description: "Wall-clock timestamp (ms since epoch) when metrics were last reset"

    - id: 1
      name: "Rear Composite"
      description: "Rear panel composite video input"

      supportedProperties:
        - SIGNAL_STRENGTH
        - SIGNAL_QUALITY
        - METRIC_SIGNAL_LOCK_TIME
        - METRIC_SIGNAL_DROPS
        - METRIC_UPTIME
        - METRIC_SIGNAL_LOCK_COUNT
        - METRIC_LAST_SIGNAL_LOCK_TIME
        - METRIC_LAST_RESET_TIMESTAMP


      propertyMetadata:
        - key: SIGNAL_STRENGTH
          type: LONG
          readOnly: true
          isMetric: false
          description: "Signal strength in dBm"

        - key: SIGNAL_QUALITY
          type: INTEGER
          readOnly: true
          isMetric: false
          description: "Aggregated signal quality percentage (0..100)"

        - key: METRIC_SIGNAL_LOCK_TIME
          type: LONG
          readOnly: true
          isMetric: true
          description: "Average signal lock time in milliseconds"

        - key: METRIC_SIGNAL_DROPS
          type: LONG
          readOnly: true
          isMetric: true
          description: "Total count of signal drops since last reset"

        - key: METRIC_UPTIME
          type: LONG
          readOnly: true
          isMetric: true
          description: "Total uptime in milliseconds"

        - key: METRIC_SIGNAL_LOCK_COUNT
          type: LONG
          readOnly: true
          isMetric: true
          description: "Total count of successful signal lock acquisitions since last reset"

        - key: METRIC_LAST_SIGNAL_LOCK_TIME
          type: LONG
          readOnly: true
          isMetric: true
          description: "Most recent signal lock time in milliseconds"

        - key: METRIC_LAST_RESET_TIMESTAMP
          type: LONG
          readOnly: true
          isMetric: true
          description: "Wall-clock timestamp (ms since epoch) when metrics were last reset"

  # Platform-wide capabilities (maps to PlatformCapabilities.aidl)
  platformCapabilities:
    halVersion: "1.0.0"                # PlatformCapabilities.halVersion (semver)
    maxPorts: 2                        # PlatformCapabilities.maxPorts (matches ports[].length)
    maximumConcurrentStartedPorts: 1   # PlatformCapabilities.maximumConcurrentStartedPorts

    # Union of all property keys supported across the platform's ports
    supportedProperties:
      - SIGNAL_STRENGTH
      - SIGNAL_QUALITY
      - METRIC_SIGNAL_LOCK_TIME
      - METRIC_SIGNAL_DROPS
      - METRIC_UPTIME
      - METRIC_SIGNAL_LOCK_COUNT
      - METRIC_LAST_SIGNAL_LOCK_TIME
      - METRIC_LAST_RESET_TIMESTAMP

    # Metadata for the platform-wide property set
    propertyMetadata:
      - key: SIGNAL_STRENGTH
        type: LONG
        readOnly: true
        isMetric: false
        description: "Signal strength in dBm"

      - key: SIGNAL_QUALITY
        type: INTEGER
        readOnly: true
        isMetric: false
        description: "Aggregated signal quality percentage (0..100)"

      - key: METRIC_SIGNAL_LOCK_TIME
        type: LONG
        readOnly: true
        isMetric: true
        description: "Average signal lock time in milliseconds"

      - key: METRIC_SIGNAL_DROPS
        type: LONG
        readOnly: true
        isMetric: true
        description: "Total count of signal drops since last reset"

      - key: METRIC_UPTIME
        type: LONG
        readOnly: true
        isMetric: true
        description: "Total uptime in milliseconds"

      - key: METRIC_SIGNAL_LOCK_COUNT
        type: LONG
        readOnly: true
        isMetric: true
        description: "Total count of successful signal lock acquisitions since last reset"

      - key: METRIC_LAST_SIGNAL_LOCK_TIME
        type: LONG
        readOnly: true
        isMetric: true
        description: "Most recent signal lock time in milliseconds"

      - key: METRIC_LAST_RESET_TIMESTAMP
        type: LONG
        readOnly: true
        isMetric: true
        description: "Wall-clock timestamp (ms since epoch) when metrics were last reset"

    # Optional feature flags (PlatformCapabilities.FeatureFlags)
    features:
      macrovisionDetectionSupported: false
